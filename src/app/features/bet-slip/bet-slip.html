<div class="selection-main-content">
    <div class="selection-header">
        <h2>Bet Slip</h2>
        <p>Affichage de la liste de vos paris et de vos cotes</p>
    </div>

    @for (pari of selectionPari$ | async; track pari.matchId) {
    <div class="card-pari">
        <div class="match-info">
            <h3>{{pari.matchLabel}}</h3>
            <p>{{pari.libellePari}}</p>
        </div>

        <div class="pari-info">
            <div class="pari-content">
                <button><span>{{pari.cote}}</span></button>
            </div>
            <input type="number" min="0" step="0.01" placeholder="Entrer une mise" onchange="sendMise(event, pari.cote)"/>
        </div>
    </div>
    }
</div>
